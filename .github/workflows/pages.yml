name: Deploy site to GitHub Pages

# Publishes the browser demo (site root) AND the full Sphinx documentation
# (under /docs/) so the docs are live and search-indexable.

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "docs/**"
      - "src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build Sphinx docs
        run: |
          sphinx-build -b html docs/source docs/_build/html

      - name: Build current wheel for the browser demo
        run: |
          python -m pip install build
          python -m build --wheel
          # Keep the real wheel filename: micropip validates it against PEP 440,
          # so a "latest" pseudo-version is rejected as an invalid wheel name.
          # The real filename is injected into the demo HTML in the next step.
          cp dist/whoosh3-*-py2.py3-none-any.whl demo/

      - name: Assemble site (demo at root, docs under /docs)
        run: |
          mkdir -p _site
          cp -r demo/. _site/
          mkdir -p _site/docs
          cp -r docs/_build/html/. _site/docs/
          # Keep the demo's JSON-LD softwareVersion in sync with the shipped release.
          VERSION="$(python -c 'import whoosh; print(whoosh.__version_str__)')"
          sed -i -E "s#(\"softwareVersion\": \")[^\"]*(\")#\1${VERSION}\2#" _site/index.html
          # Inject the real wheel filename so micropip can install it (PEP 440).
          WHEEL="$(cd dist && ls whoosh3-*-py2.py3-none-any.whl | head -1)"
          echo "Demo wheel: ${WHEEL}"
          sed -i "s#__WHEEL_FILENAME__#${WHEEL}#g" _site/index.html
          # Fail loudly if the placeholder was not replaced (guards the live demo).
          if grep -q "__WHEEL_FILENAME__" _site/index.html; then
            echo "ERROR: __WHEEL_FILENAME__ placeholder was not replaced" >&2
            exit 1
          fi

      - name: Self-heal sitemap (append any built docs pages not yet listed)
        run: |
          python - <<'PY'
          import pathlib, re, datetime
          base = "https://priya-sundaram-dev.github.io/whoosh"
          site = pathlib.Path("_site")
          sm = site / "sitemap.xml"
          text = sm.read_text()
          today = datetime.date.today().isoformat()
          # Collect every built docs HTML page.
          pages = sorted(p.name for p in (site / "docs").glob("*.html"))
          missing = [f"docs/{p}" for p in pages if f"{base}/docs/{p}" not in text]
          if missing:
              entries = "".join(
                  f"  <url>\n"
                  f"    <loc>{base}/{path}</loc>\n"
                  f"    <lastmod>{today}</lastmod>\n"
                  f"    <changefreq>monthly</changefreq>\n"
                  f"    <priority>0.6</priority>\n"
                  f"  </url>\n"
                  for path in missing
              )
              text = text.replace("</urlset>", entries + "</urlset>")
              sm.write_text(text)
              print(f"Added {len(missing)} missing sitemap entries: {missing}")
          else:
              print("Sitemap already complete.")
          PY

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
