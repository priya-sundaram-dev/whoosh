name: Deploy site to GitHub Pages

# Publishes the browser demo (site root) AND the full Sphinx documentation
# (under /docs/) so the docs are live and search-indexable.

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "docs/**"
      - "src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build Sphinx docs
        run: |
          sphinx-build -b html docs/source docs/_build/html

      - name: Build current wheel for the browser demo
        run: |
          python -m pip install build
          python -m build --wheel
          # The demo installs "./whoosh3-latest-py2.py3-none-any.whl" via micropip,
          # so the live demo always runs the current release with no committed binary.
          cp dist/whoosh3-*-py2.py3-none-any.whl demo/whoosh3-latest-py2.py3-none-any.whl

      - name: Assemble site (demo at root, docs under /docs)
        run: |
          mkdir -p _site
          cp -r demo/. _site/
          mkdir -p _site/docs
          cp -r docs/_build/html/. _site/docs/
          # Keep the demo's JSON-LD softwareVersion in sync with the shipped release.
          VERSION="$(python -c 'import whoosh; print(whoosh.__version_str__)')"
          sed -i -E "s#(\"softwareVersion\": \")[^\"]*(\")#\1${VERSION}\2#" _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
