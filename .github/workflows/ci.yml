name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -q

  future-proof:
    name: Future-proof (warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          allow-prereleases: true
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Run tests with DeprecationWarning promoted to error
        # Guards the "runs clean on modern Python" promise: if a future
        # CPython deprecates something Whoosh relies on, this job fails
        # loudly here instead of silently breaking downstream users.
        run: python -m pytest tests/ -q -W error::DeprecationWarning -W error::PendingDeprecationWarning

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - name: ruff check
        run: ruff check . || true

  types:
    name: Types (mypy smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install mypy
      - name: mypy type-check the public-API smoke fixture
        # Type-checks tests/typing_smoke.py (a realistic downstream-usage
        # snippet) against Whoosh's shipped annotations. Guards that the
        # public API stays typed for users' editors and mypy runs (gh#3).
        run: python -m mypy
